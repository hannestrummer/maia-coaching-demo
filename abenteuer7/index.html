<style>
  /* App-Frame: Topbar/Tabs fix, Chat-Mitte scrollt (folgt automatisch) */
  .phone{height:100vh;height:100dvh;max-height:100dvh;overflow:hidden}  /* dvh: iOS-Tastatur/Chrome schneiden den Composer nicht ab */
  .stream{overflow-y:auto;min-height:0}
  .stream>*{flex-shrink:0}  /* Chat-Elemente nie zusammendrücken (Video-Karte kollabierte sonst auf Höhe 0) */
  /* Abenteuer-7-Ergänzungen (Maia-Tokens) */
  .checklist{align-self:flex-start;max-width:88%;margin-left:34px;background:#fff;border-radius:15px;padding:13px 16px;
    box-shadow:0 3px 12px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.07);display:grid;grid-template-columns:1fr 1fr;gap:7px 16px}
  .cl-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
  .cl-item svg{color:var(--mint-deep);flex:none}
  .audio .acol{flex:1;min-width:0}
  .audio .bar i{display:block;height:100%;width:34%;background:var(--mint-deep);border-radius:50px}
  .vcard{padding:0;position:relative}
  .vcard .vwrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:15px 15px 0 0;overflow:hidden}
  .vcard .vwrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;border:0}
  .vcard .vmeta{padding:11px 14px}
  /* weiches weißes Eck-Fade löst das eingebrannte Wasserzeichen (minusplus / ONLINE HAIR SCHOOL) auf —
     auf dem weißen Studio-Hintergrund praktisch unsichtbar; darüber unser EINES Logo */
  .vcard .vwrap::after{content:"";position:absolute;top:0;left:0;width:48%;height:72px;z-index:1;pointer-events:none;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.85) 45%,rgba(255,255,255,0) 80%)}
  .vlogo{position:absolute;top:9px;left:9px;height:18px;width:auto;padding:5px 8px;background:#fff;border-radius:7px;box-shadow:0 1px 4px rgba(0,0,0,.14);z-index:3;pointer-events:none}
  /* Einheitliches gebrandetes Cover im Ruhezustand (versteckt das uneinheitliche Video-Intro) */
  .vcard .vcover{position:absolute;inset:0;z-index:2;border:none;padding:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2f4f3f,#1b2a22);cursor:pointer;transition:opacity .4s ease}
  .vcard .vcover.hidden{opacity:0;pointer-events:none}
  .vcard .vcover-play{width:60px;height:60px;border-radius:50%;background:var(--rose5);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(196,86,111,.55)}
  .vcard .vcover-play svg{width:26px;height:26px;margin-left:3px;fill:#fff}
  /* Vollbild-Button (Apple-Expand) oben rechts — erst sichtbar, wenn das Video läuft */
  .vcard .vfs{position:absolute;top:9px;right:9px;z-index:4;width:34px;height:34px;border:none;border-radius:9px;background:rgba(20,24,27,.42);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);color:#fff;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.28)}
  .vcard.playing .vfs{display:flex}
  .vcard .vfs:active{transform:scale(.94)}
  .vcard .vfs svg{width:17px;height:17px}
  @media (prefers-reduced-motion:reduce){.vcard .vcover{transition:none}}
  /* im Vollbild ungeschnitten zeigen (inline ist es cover-beschnitten) */
  video:fullscreen{object-fit:contain;background:#000}
  video:-webkit-full-screen{object-fit:contain;background:#000}
  /* Bild-Karte (echte WP-Illustration) */
  .imgcard{align-self:flex-start;max-width:70%;margin-left:34px;background:#fff;border-radius:15px;padding:14px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
  .imgcard img{width:100%;display:block}
  /* Audio-Player (echte Sourance-Tracks) */
  .audiopl{align-self:flex-start;max-width:88%;margin-left:34px;background:#fff;border-radius:15px;padding:14px 16px;box-shadow:0 3px 12px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.07)}
  .apl-head{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--mint-deep);display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
  .apl-head small{font-family:'DM Sans',sans-serif;font-weight:400;color:var(--light);font-size:11.5px}
  .apl-tracks{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
  .apl-track{display:flex;align-items:center;gap:9px;background:var(--mint-soft);border:1.5px solid transparent;color:var(--ink);border-radius:11px;padding:9px 12px;font:inherit;font-size:13.5px;cursor:pointer;text-align:left}
  .apl-track svg{color:var(--mint-deep);flex:none}
  .apl-track.on{border-color:var(--mint-deep);background:#fff}
  .apl-audio{width:100%;height:34px}
  /* EIN durchgehender Chat: permanente Eingabe + geführte Steuerelemente inline */
  .dock:has(.composer){padding:0;border-top:none}
  .composer{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-top:1px solid var(--g2);transition:background .25s ease}
  .composer input{flex:1;min-width:0;background:var(--g1);border:1.5px solid transparent;border-radius:50px;padding:11px 15px;font:inherit;font-size:14px;color:var(--ink);outline:none;transition:background .2s,border-color .2s,box-shadow .2s}
  .composer input::placeholder{color:var(--light)}
  .composer button{width:38px;height:38px;flex:none;border:none;border-radius:50%;background:var(--rose5);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s,background .2s}
  .composer button:active{transform:scale(.94)}
  .composer button svg{width:19px;height:19px;fill:#fff}
  .composer.answering input{background:var(--mint-soft);border-color:var(--mint);box-shadow:0 0 0 3px rgb(var(--mint-wash)/.32)}
  .composer.answering button{background:var(--mint-deep)}
  .inline-chips{align-self:flex-start;max-width:88%;margin-left:34px;display:flex;flex-wrap:wrap;gap:8px;animation:pop .35s cubic-bezier(.16,1,.3,1)}
  .inline-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--rose5);border:1.5px solid var(--rose2);border-radius:50px;padding:9px 15px;font:inherit;font-size:13.5px;font-weight:500;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:transform .12s,background .2s,color .2s,border-color .2s,box-shadow .2s}
  .inline-chip:hover{border-color:var(--rose4)}
  .inline-chip:active{transform:scale(.97)}
  .inline-chip svg{width:15px;height:15px;flex:none;margin-left:-2px}
  .inline-chip:not(.chosen) svg{display:none}
  .inline-chip.chosen{background:var(--rose5);color:#fff;border-color:var(--rose5);box-shadow:0 3px 10px rgba(196,86,111,.35)}
  .inline-chip:disabled{cursor:default}
  .inline-chip:not(.chosen):disabled{opacity:.45;box-shadow:none}
  .inline-cta-wrap{align-self:stretch;display:flex;justify-content:center;margin:2px 0;animation:pop .35s cubic-bezier(.16,1,.3,1)}
  .inline-cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--mint-deep);color:#fff;border:none;border-radius:50px;padding:12px 26px;font:inherit;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 3px 10px rgba(68,136,95,.32);transition:transform .12s,box-shadow .2s}
  .inline-cta:hover{box-shadow:0 5px 16px rgba(68,136,95,.4)}
  .inline-cta:active{transform:scale(.99)}
  @media (prefers-reduced-motion:reduce){.inline-chips,.inline-cta-wrap{animation:none}.inline-chip,.inline-cta,.composer,.composer input,.composer button{transition:none}.composer.answering input{animation:none}}
  /* Performance / Apple-Feel: flüssiges Momentum-Scrollen (Browser komponiert den Overflow-Scroller selbst;
     kein will-change, kein content-visibility — Ersatzhöhen führten laut Review zu Fling-Sprüngen). */
  .stream{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  /* Apple-Tap-Ziele ≥44px + Safe-Area an der UNTERSTEN Leiste (Tabs), nicht am Composer */
  .composer button{width:44px;height:44px}
  .inline-chip,.inline-cta,.apl-track{min-height:44px}
  .tabs{padding-bottom:env(safe-area-inset-bottom,0px)}
</style>
