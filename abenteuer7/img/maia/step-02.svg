<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img">
  <title>Maia – Mit allen Sinnen</title>
  <defs>
    <radialGradient id="faceGradient" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ffe9f1"/>
      <stop offset="70%" stop-color="#f8cad9"/>
      <stop offset="100%" stop-color="#efb6c9"/>
    </radialGradient>
  </defs>
  <style>
    .sparkle { transform-box: fill-box; transform-origin: center; animation: twinkle 2.5s ease-in-out infinite; }
    .sparkle-2 { animation-delay: 0.8s; }
    .sparkle-3 { animation-delay: 1.6s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  <rect x="0" y="0" width="320" height="220" rx="26" fill="#e8f6f0"/>
  <path d="M210 55 C210 25 252 14 278 30 C302 45 306 76 286 93 C262 113 220 101 212 79 C208 69 208 62 210 55 Z" fill="#fdf0f3"/>
  <!-- body -->
  <path d="M100 220 Q100 128 150 118 Q200 128 200 220 Z" fill="#C3EBD8"/>
  <!-- left arm relaxed -->
  <path d="M112 152 Q104 190 112 200" fill="none" stroke="#C3EBD8" stroke-width="17" stroke-linecap="round"/>
  <circle cx="112" cy="200" r="8" fill="#C3EBD8"/>
  <!-- head (fixed Maia face) -->
  <g transform="translate(83.44 19.44) scale(0.26)">
    <circle cx="256" cy="256" r="150" fill="url(#faceGradient)"/>
    <path d="M168 172c16-12 35-14 52-5" fill="none" stroke="#b05b79" stroke-linecap="round" stroke-width="14"/>
    <path d="M292 168c17-10 37-8 52 4" fill="none" stroke="#b05b79" stroke-linecap="round" stroke-width="14"/>
    <path d="M170 224c14-10 28-10 42 0" fill="none" stroke="#1f1f22" stroke-linecap="round" stroke-width="18"/>
    <path d="M304 224c13 9 27 9 40 0" fill="none" stroke="#1f1f22" stroke-linecap="round" stroke-width="18"/>
    <path d="M196 309c36 22 82 20 116-4" fill="none" stroke="#1f1f22" stroke-linecap="round" stroke-width="18"/>
  </g>
  <!-- right arm, hand thoughtfully at the cheek/chin (foreground) -->
  <path d="M188 158 Q184 128 172 114" fill="none" stroke="#C3EBD8" stroke-width="17" stroke-linecap="round"/>
  <circle cx="170" cy="112" r="9" fill="#C3EBD8"/>
  <!-- sparkles -->
  <path class="sparkle sparkle-1" d="M235 35 L239 42 L246 46 L239 50 L235 57 L231 50 L224 46 L231 42 Z" fill="#c4566f"/>
  <path class="sparkle sparkle-2" d="M272 67 L274.5 71.5 L279 74 L274.5 76.5 L272 81 L269.5 76.5 L265 74 L269.5 71.5 Z" fill="#44885f"/>
  <path class="sparkle sparkle-3" d="M246 93 L247.8 96.2 L251 98 L247.8 99.8 L246 103 L244.2 99.8 L241 98 L244.2 96.2 Z" fill="#c4566f"/>
  <!-- thought dots -->
  <circle cx="206" cy="52" r="5" fill="#44885f"/>
  <circle cx="216" cy="42" r="3" fill="#44885f"/>
</svg>
