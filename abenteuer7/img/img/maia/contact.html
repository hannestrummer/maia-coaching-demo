<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maia – Abenteuer 7 Szenen</title>
  <style>
    :root {
      --mint: #C3EBD8; --mint-soft: #e8f6f0; --mint-deep: #44885f;
      --rose1: #fdf0f3; --rose2: #f6d3db; --rose: #c4566f; --ink: #15181b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 32px 20px 48px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: #ffffff;
    }
    header { max-width: 1080px; margin: 0 auto 28px; }
    h1 { font-size: 22px; margin: 0 0 6px; letter-spacing: -0.01em; }
    p.sub { margin: 0; color: #6b7280; font-size: 14px; }
    .grid {
      max-width: 1080px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    figure {
      margin: 0; border: 1px solid #eceef0; border-radius: 18px; overflow: hidden;
      background: #fff; box-shadow: 0 1px 3px rgba(20,24,27,0.05);
    }
    .art { background: var(--mint-soft); }
    .art svg { display: block; width: 100%; height: auto; }
    figcaption { padding: 12px 16px 14px; }
    .step { font-size: 12px; font-weight: 600; color: var(--mint-deep); letter-spacing: 0.06em; text-transform: uppercase; }
    .label { font-size: 15px; margin-top: 2px; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f1113; color: #f3f4f5; }
      figure { background: #16181b; border-color: #23262a; }
      figcaption .label { color: #f3f4f5; }
      p.sub { color: #9aa0a6; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Maia – Abenteuer 7 (9 Szenen)</h1>
    <p class="sub">Eine wiederkehrende Maia pro Lernschritt · gleicher Charakter, gleiche Palette, phone-width.</p>
  </header>
  <div class="grid">
    <figure><div class="art"><object type="image/svg+xml" data="step-01.svg" aria-label="Stimm dich ein"></object></div><figcaption><div class="step">Schritt 1</div><div class="label">Stimm dich ein</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-02.svg" aria-label="Mit allen Sinnen"></object></div><figcaption><div class="step">Schritt 2</div><div class="label">Mit allen Sinnen</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-03.svg" aria-label="Schneide Papier"></object></div><figcaption><div class="step">Schritt 3</div><div class="label">Schneide Papier</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-04.svg" aria-label="Imitiere den Mentor"></object></div><figcaption><div class="step">Schritt 4</div><div class="label">Imitiere den Mentor</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-05.svg" aria-label="Schneide Haare"></object></div><figcaption><div class="step">Schritt 5</div><div class="label">Schneide Haare</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-06.svg" aria-label="Feiere deine Ergebnisse"></object></div><figcaption><div class="step">Schritt 6</div><div class="label">Feiere deine Ergebnisse</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-07.svg" aria-label="Mentors Check"></object></div><figcaption><div class="step">Schritt 7</div><div class="label">Mentors Check</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-08.svg" aria-label="Vertiefe dein Wissen"></object></div><figcaption><div class="step">Schritt 8</div><div class="label">Vertiefe dein Wissen</div></figcaption></figure>
    <figure><div class="art"><object type="image/svg+xml" data="step-09.svg" aria-label="Tagebuch deiner Stärken"></object></div><figcaption><div class="step">Schritt 9</div><div class="label">Tagebuch deiner Stärken</div></figcaption></figure>
  </div>
</body>
</html>
