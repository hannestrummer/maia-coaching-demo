  <path d="M138 150 Q172 128 196 116" fill="none" stroke="#C3EBD8" stroke-width="17" stroke-linecap="round"/>
  <circle cx="198" cy="116" r="7" fill="#C3EBD8"/>
  <!-- head (fixed Maia face) -->
  <g transform="translate(41.44 25.44) scale(0.26)">
    <circle cx="256" cy="256" r="150" fill="url(#faceGradient)"/>
    <path d="M168 176c16-11 35-13 52-4" fill="none" stroke="#b05b79" stroke-linecap="round" stroke-width="14"/>
    <path d="M292 172c17-9 37-7 52 4" fill="none" stroke="#b05b79" stroke-linecap="round" stroke-width="14"/>
    <circle cx="190" cy="221" r="19" fill="#1f1f22"/>
    <circle cx="322" cy="221" r="19" fill="#1f1f22"/>
    <path d="M238 313c7 5 25 5 36 0" fill="none" stroke="#1f1f22" stroke-linecap="round" stroke-width="18"/>
  </g>
  <!-- scissors near the mannequin's hair -->
  <circle cx="200" cy="114" r="2" fill="#15181b"/>
  <path d="M200 114 L218 101" stroke="#15181b" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 114 L218 108" stroke="#15181b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="193" cy="120" r="4.5" fill="none" stroke="#c4566f" stroke-width="3"/>
  <circle cx="192" cy="112" r="4.5" fill="none" stroke="#c4566f" stroke-width="3"/>
